name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Create .env file
      run: |
        echo "USER_STANDARD=${{ secrets.USER_STANDARD }}" >> .env
        echo "USER_LOCKED=${{ secrets.USER_LOCKED }}" >> .env
        echo "USER_PROBLEM=${{ secrets.USER_PROBLEM }}" >> .env
        echo "USER_PERFORMANCE=${{ secrets.USER_PERFORMANCE }}" >> .env
        echo "USER_ERROR=${{ secrets.USER_ERROR }}" >> .env
        echo "USER_VISUAL=${{ secrets.USER_VISUAL }}" >> .env
        echo "USER_PASSWORD=${{ secrets.USER_PASSWORD }}" >> .env
        echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy-report:
    needs: test
    if: github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4